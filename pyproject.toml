[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "genai-studio-sdk"
dynamic = ["version"]
description = "A Python wrapper for Purdue's GenAI Studio API — chat, streaming, multi-turn conversations, embeddings, RAG, and a CLI."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Timothy Reese" }]
keywords = ["llm", "genai", "purdue", "openai", "ollama", "litellm", "rag", "embeddings"]
dependencies = [
    "openai",
    "httpx",
    "numpy",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Education",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/treese41528/genai-studio-sdk"
Repository = "https://github.com/treese41528/genai-studio-sdk"

[project.scripts]
genai-studio = "genai_studio:main"

# Single-module distribution: the package is the one file genai_studio.py
[tool.setuptools]
py-modules = ["genai_studio"]

# Single-source the version from genai_studio.__version__ (read via ast, no import)
[tool.setuptools.dynamic]
version = { attr = "genai_studio.__version__" }
